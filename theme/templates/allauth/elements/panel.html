{% load allauth %}
<section class="card bg-base-100 border border-base-300 my-4">
    <div class="card-body">
        <h2 class="card-title text-lg">
            {% slot title %}
            {% endslot %}
        </h2>
        {% slot body %}
        {% endslot %}
        {% if slots.actions %}
            <div class="card-actions mt-2">
                {% for action in slots.actions %}{{ action }}{% endfor %}
            </div>
        {% endif %}
    </div>
</section>
